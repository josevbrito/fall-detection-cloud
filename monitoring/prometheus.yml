# monitoring/prometheus.yml (SERVIDOR)
# ------------------------------------
# Na nuvem o cliente tem IP dinâmico atrás de NAT, então o Prometheus NÃO
# consegue raspá-lo direto (pull). A solução é o Pushgateway: o load test
# EMPURRA suas métricas para o Pushgateway (endereço fixo na rede Docker) e o
# Prometheus raspa o Pushgateway aqui mesmo, localmente.
#
#   load test (cliente, IP qualquer) --push--> pushgateway <--pull-- prometheus

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "pushgateway"
    # honor_labels: true preserva o label "node" enviado por cada cliente,
    # em vez de o Prometheus sobrescrever com o nome do alvo.
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
